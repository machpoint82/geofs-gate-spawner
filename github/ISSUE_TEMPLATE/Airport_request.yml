name: Airport Request
description: Request a new airport be added to the gate spawner
title: "[Airport Request]: "
labels: ["airport-request"]
body:
  - type: input
    id: icao
    attributes:
      label: ICAO Code
      description: 4-letter ICAO code of the airport
      placeholder: "e.g. KJFK"
    validations:
      required: true

  - type: input
    id: airport-name
    attributes:
      label: Airport Name
      placeholder: "e.g. John F. Kennedy International Airport"
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Region
      options:
        - North America
        - South America
        - Europe
        - Asia
        - Africa
        - Oceania
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional Details
      description: Gate layout source, parking chart links, notes, etc.
    validations:
      required: false
